name: Java CI - Online Auction System

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install headless UI dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk-3-0 libgl1

      - name: Build and test with Maven
        run: xvfb-run -a mvn clean verify --batch-mode
        env:
          MAVEN_OPTS: >-
            -Djava.awt.headless=true
            -Dtestfx.headless=true
            -Dtestfx.robot=glass
            -Dglass.platform=Monocle
            -Dmonocle.platform=Headless
            -Dprism.order=sw

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

      - name: Upload JAR artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            common/target/*.jar
            server/target/*.jar
            client/target/*.jar
